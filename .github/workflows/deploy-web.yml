name: Deploy Web (Admin) ke Firebase Hosting

# Setup SEKALI SAJA sebelum workflow ini bisa jalan:
# 1. Buat project di https://console.firebase.google.com (gratis, plan Spark).
# 2. Aktifkan Hosting di project itu (klik "Hosting" di sidebar > Get started).
# 3. Buat file alpukat_app/.firebaserc berisi project ID Anda
#    (contoh ada di alpukat_app/.firebaserc.example — copy lalu isi projectId).
# 4. Generate Service Account key:
#    Firebase Console > Project Settings > Service accounts > Generate new private key
#    -> download file JSON-nya.
# 5. Simpan isi file JSON tsb sebagai GitHub Secret bernama:
#    FIREBASE_SERVICE_ACCOUNT
#    (Settings > Secrets and variables > Actions > New repository secret)
# 6. (Opsional) Set Repository Variable API_BASE_URL seperti di build-apk.yml,
#    supaya versi web juga connect ke backend production yang benar.
#
# Setelah semua di atas selesai, workflow ini otomatis jalan tiap push ke
# main, atau bisa dipicu manual lewat tab Actions > "Deploy Web..." > Run workflow.

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "URL backend production (override, opsional)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "alpukat_app/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alpukat_app

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Tentukan API_BASE_URL yang dipakai
        id: apiurl
        run: |
          if [ -n "${{ inputs.api_base_url }}" ]; then
            echo "url=${{ inputs.api_base_url }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.API_BASE_URL }}" ]; then
            echo "url=${{ vars.API_BASE_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost:8000" >> "$GITHUB_OUTPUT"
            echo "::warning::API_BASE_URL belum diset. Web akan mengarah ke localhost."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (release)
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ steps.apiurl.outputs.url }}

      - name: Deploy ke Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: default
          entryPoint: alpukat_app
