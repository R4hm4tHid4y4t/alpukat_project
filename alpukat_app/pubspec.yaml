name: alpukat_app
description: Aplikasi Mobile Klasifikasi Varietas dan Deteksi Kematangan Buah Alpukat menggunakan CNN
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP & Network
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.2

  # Dependency Injection
  get_it: ^8.0.2
  injectable: ^2.4.4

  # Serialization
  json_annotation: ^4.9.0

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.1.0
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
